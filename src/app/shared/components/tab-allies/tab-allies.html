<section class="gv-card">
  <div class="flex items-center justify-between gap-4">
    <div>
      <h3 class="gv-title">Allies</h3>
      <span class="gv-subtitle">Rede</span>
    </div>

    @if (isOwner()) {
    <button type="button" class="gv-btn gv-btn-cyan gv-btn-sm">Criar aliança</button>
    }
  </div>

  <div class="mt-5 space-y-4">
    <article class="gv-card gv-surface-2">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="gv-stat">Lysa</p>
          <p class="mt-1 gv-muted">Suporte e cura</p>
        </div>
        <button type="button" class="gv-btn gv-btn-red gv-btn-sm">Remover aliança</button>
      </div>
    </article>

    <article class="gv-card gv-surface-2">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="gv-stat">Daren</p>
          <p class="mt-1 gv-muted">Tanque e proteção</p>
        </div>
        <button type="button" class="gv-btn gv-btn-red gv-btn-sm">Remover aliança</button>
      </div>
    </article>

    <article class="gv-card gv-surface-2">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="gv-stat">Tova</p>
          <p class="mt-1 gv-muted">Exploração e coleta</p>
        </div>
        <button type="button" class="gv-btn gv-btn-red gv-btn-sm">Remover aliança</button>
      </div>
    </article>
  </div>
</section>
