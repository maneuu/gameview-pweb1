<section class="gv-card">
  <div class="flex items-center justify-between gap-4">
    <h3 class="gv-title">Missions</h3>
    <span class="gv-subtitle">Progresso</span>
  </div>

  <div class="mt-5 space-y-4">
    @if (isLoading()) {
    <p class="gv-muted">Carregando missoes...</p>
    } @else if (missions().length === 0) {
    <p class="gv-muted">Nenhuma missao registrada.</p>
    } @else {
    @for (mission of missions(); track mission.id_missao_registro) {
    <article class="gv-card gv-surface-2">
      <div class="flex items-center justify-between gap-4">
        <div>
          <p class="gv-stat">Missao ID: {{ mission.fk_id_missao }}</p>
          <p class="mt-1 gv-muted">{{ mission.status }}</p>
        </div>
      </div>
    </article>
    }
    }
  </div>
</section>
