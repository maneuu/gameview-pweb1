<section class="gv-crt mx-auto min-h-screen max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
  <div class="flex flex-col gap-6 border-b gv-border pb-6 sm:flex-row sm:items-start sm:justify-between">
    <div class="max-w-3xl space-y-4">
      <p class="gv-subtitle">Painel principal</p>
      <h1 class="gv-title">Bem-vindo ao GameView</h1>
      <p class="gv-muted">
        Aqui voce visualiza estatisticas de jogadores, classes e personagens, alem de acessar perfis
        publicos em um painel retro. Use os atalhos abaixo para explorar o ranking e buscar jogadores.
      </p>
    </div>
    <div class="flex flex-wrap gap-2">
      <a routerLink="/leaderboard" class="gv-btn gv-btn-ghost gv-btn-sm">Ver ranking</a>
      <a routerLink="/search" class="gv-btn gv-btn-cyan gv-btn-sm">Buscar jogador</a>
    </div>
  </div>

  <section class="mt-8">
    <app-player-overview [isOwner]="true" />
  </section>
</section>
