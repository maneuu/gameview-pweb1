<section class="gv-crt min-h-screen gv-bg px-4 py-8 gv-text sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <div class="mb-8 flex flex-col gap-3 border-b gv-border pb-6 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <p class="gv-subtitle">Ranking global</p>
        <h1 class="mt-3 gv-title">Leaderboard</h1>
      </div>
      <p class="max-w-md gv-muted">Top 10 jogadores</p>
    </div>

    <div class="space-y-4">

      @for (jogador of jogadores(); track jogador.id_jogador; let i = $index) {

      <app-card>
        <span card-title>
          #{{ i + 1 }} {{ jogador.nome_usuario }}
        </span>

        <span card-content>
          Pontuação: {{ jogador.pontuacao }}
        </span>
      </app-card>

      }

    </div>
  </div>
</section>
