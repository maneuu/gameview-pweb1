<section class="gv-crt min-h-screen gv-bg px-4 py-8 gv-text sm:px-6 lg:px-8">

  <div class="mx-auto max-w-5xl">

    <div class="text-center">
      <p class="gv-subtitle">Consulta pública</p>

      <h1 class="mt-3 gv-title">
        Buscar jogador
      </h1>

      <p class="mx-auto mt-3 max-w-2xl gv-muted">
        Encontre perfis públicos em um catálogo limpo e simples.
      </p>
    </div>

    <div class="mx-auto mt-8 max-w-2xl">

      <app-searchbar (buscar)="buscarJogador($event)" />

    </div>

    <div class="mt-8 space-y-4">

      @for (jogador of resultados(); track jogador.idJogador) {

      <div class="gv-card">

        <h2 class="text-xl font-bold">
          {{ jogador.nomeUsuario }}
        </h2>

        <p>
          ID: {{ jogador.idJogador }}
        </p>

        <button class="gv-btn gv-btn-cyan mt-4" (click)="abrirPerfil(jogador.idJogador)">
          Ver overview
        </button>

      </div>

      }

    </div>

  </div>

</section>
