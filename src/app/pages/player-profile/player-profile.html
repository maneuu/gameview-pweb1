<section class="gv-crt mx-auto min-h-screen max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
  @if (isLoading()) {
  <p class="gv-muted">Carregando perfil...</p>
  } @else if (player(); as jogador) {
  <div class="border-b gv-border pb-6">
    <p class="gv-subtitle">Perfil público</p>
    <h1 class="mt-3 gv-title">Perfil de {{ jogador.nomeUsuario }}</h1>
  </div>

  <section class="mt-8">
    <app-player-overview [isOwner]="isOwner()" [player]="jogador" />
  </section>
  } @else {
  <p class="gv-muted">Jogador não encontrado.</p>
  }
</section>
