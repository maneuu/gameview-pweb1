<section class="flex min-h-screen items-center justify-center gv-bg px-4 py-10 gv-text">
  <div class="w-full max-w-md rounded-3xl border gv-border gv-surface p-6 gv-shadow-soft sm:p-8">
    <div class="mb-8 text-center">
      <p class="text-xs font-medium uppercase tracking-[0.28em] gv-muted">Acesso</p>
      <h1 class="mt-3 text-3xl font-semibold tracking-tight gv-text">Entrar</h1>
      <p class="mt-3 text-sm leading-6 gv-muted">Use seu ID de jogador para continuar</p>
    </div>

    <div class="space-y-4">
      <label class="block space-y-2">
        <span class="text-sm font-medium gv-text">ID do jogador</span>
        <input type="text" placeholder="Digite seu ID" class="w-full rounded-xl border gv-border gv-surface px-4 py-3 text-sm gv-text outline-none placeholder:gv-muted" />
      </label>

      <label class="block space-y-2">
        <span class="text-sm font-medium gv-text">Senha</span>
        <input type="password" placeholder="Digite sua senha" class="w-full rounded-xl border gv-border gv-surface px-4 py-3 text-sm gv-text outline-none placeholder:gv-muted" />
      </label>

      <button type="button" class="w-full rounded-xl border gv-border gv-accent-bg px-4 py-3 text-sm font-medium text-white transition gv-hover-surface">
        Entrar
      </button>

      <button type="button" class="w-full rounded-xl border gv-border gv-surface px-4 py-3 text-sm font-medium gv-text transition gv-hover-surface">
        Entrar como visitante
      </button>

      <div class="pt-2 text-center text-sm gv-muted">
        <a href="#" class="font-medium gv-accent">Criar conta</a>
      </div>
    </div>
  </div>
</section>
